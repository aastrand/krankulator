name: Rust

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Update dependencies
      run: sudo apt-get update
    - name: Install dependencies
      run: sudo apt-get install libncurses-dev libncursesw5-dev curl unzip tar libasound2-dev libudev-dev
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  wasm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - name: Build core for wasm32
      run: cargo build -p krankulator-core --target wasm32-unknown-unknown
    - name: Build web for wasm32
      run: cargo build -p krankulator-web --target wasm32-unknown-unknown

  mixer-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Update dependencies
      run: sudo apt-get update
    - name: Install dependencies
      run: sudo apt-get install libncurses-dev libncursesw5-dev curl unzip tar libasound2-dev libudev-dev
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Set up Python venv
      run: cd scripts && uv venv && uv pip install -r requirements.txt
    - name: Build
      run: cargo build --release
    - name: Run mixer tests
      run: cargo test --release test_apu_mixer -- --ignored --nocapture --test-threads=4
