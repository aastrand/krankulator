name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Calculate version
      id: calc
      run: |
        MAJOR_MINOR=$(grep '^version' core/Cargo.toml | head -1 | sed 's/.*"\([0-9]*\.[0-9]*\).*/\1/')
        PATCH=$(git rev-list --count HEAD)
        echo "version=${MAJOR_MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: version
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Patch version
      run: |
        sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" core/Cargo.toml desktop/Cargo.toml web/Cargo.toml libretro/Cargo.toml
        sed -i '' "s/LIBRARY_VERSION: &\[u8\] = b\".*\\\\0\";/LIBRARY_VERSION: \&[u8] = b\"$VERSION\\\\0\";/" libretro/src/lib.rs
        sed -i '' "s/display_version = \".*\"/display_version = \"$VERSION\"/" libretro/krankulator_libretro.info
    - name: Build
      run: cargo build --release -p krankulator-desktop
    - name: Create .icns
      run: |
        mkdir icon.iconset
        sips -z 16 16     desktop/assets/icon.png --out icon.iconset/icon_16x16.png
        sips -z 32 32     desktop/assets/icon.png --out icon.iconset/icon_16x16@2x.png
        sips -z 32 32     desktop/assets/icon.png --out icon.iconset/icon_32x32.png
        sips -z 64 64     desktop/assets/icon.png --out icon.iconset/icon_32x32@2x.png
        sips -z 128 128   desktop/assets/icon.png --out icon.iconset/icon_128x128.png
        sips -z 256 256   desktop/assets/icon.png --out icon.iconset/icon_128x128@2x.png
        sips -z 256 256   desktop/assets/icon.png --out icon.iconset/icon_256x256.png
        sips -z 512 512   desktop/assets/icon.png --out icon.iconset/icon_256x256@2x.png
        sips -z 512 512   desktop/assets/icon.png --out icon.iconset/icon_512x512.png
        sips -z 1024 1024 desktop/assets/icon.png --out icon.iconset/icon_512x512@2x.png
        iconutil -c icns icon.iconset -o icon.icns
    - name: Create .app bundle
      run: |
        mkdir -p Krankulator.app/Contents/MacOS
        mkdir -p Krankulator.app/Contents/Resources
        cp target/release/krankulator Krankulator.app/Contents/MacOS/
        cp desktop/assets/Info.plist Krankulator.app/Contents/
        cp icon.icns Krankulator.app/Contents/Resources/
        codesign --force --deep -s - Krankulator.app
        zip -r "Krankulator-${VERSION}-macOS-arm64.zip" Krankulator.app
    - uses: actions/upload-artifact@v4
      with:
        name: macos
        path: Krankulator-*-macOS-arm64.zip

  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Patch version
      shell: pwsh
      run: |
        foreach ($f in @('core/Cargo.toml', 'desktop/Cargo.toml', 'web/Cargo.toml', 'libretro/Cargo.toml')) {
          (Get-Content $f) -replace '^version = ".*"', "version = `"$env:VERSION`"" | Set-Content $f
        }
        (Get-Content 'libretro/src/lib.rs') -replace 'LIBRARY_VERSION: &\[u8\] = b".*\\0";', "LIBRARY_VERSION: &[u8] = b`"$env:VERSION\0`";" | Set-Content 'libretro/src/lib.rs'
        (Get-Content 'libretro/krankulator_libretro.info') -replace 'display_version = ".*"', "display_version = `"$env:VERSION`"" | Set-Content 'libretro/krankulator_libretro.info'
    - name: Build
      run: cargo build --release -p krankulator-desktop
    - name: Package
      run: Compress-Archive -Path target/release/krankulator.exe -DestinationPath "Krankulator-${env:VERSION}-Windows-x86_64.zip"
    - uses: actions/upload-artifact@v4
      with:
        name: windows
        path: Krankulator-*-Windows-x86_64.zip

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libfuse2 imagemagick
    - name: Patch version
      run: |
        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" core/Cargo.toml desktop/Cargo.toml web/Cargo.toml libretro/Cargo.toml
        sed -i "s/LIBRARY_VERSION: &\[u8\] = b\".*\\\\0\";/LIBRARY_VERSION: \&[u8] = b\"$VERSION\\\\0\";/" libretro/src/lib.rs
        sed -i "s/display_version = \".*\"/display_version = \"$VERSION\"/" libretro/krankulator_libretro.info
    - name: Build
      run: cargo build --release -p krankulator-desktop
    - name: Create AppImage
      run: |
        convert desktop/assets/icon.png -resize 256x256 krankulator.png
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --executable target/release/krankulator \
          --desktop-file desktop/assets/krankulator.desktop \
          --icon-file krankulator.png \
          --output appimage
        mv Krankulator-*.AppImage "Krankulator-${VERSION}-Linux-x86_64.AppImage"
    - uses: actions/upload-artifact@v4
      with:
        name: linux
        path: Krankulator-*-Linux-x86_64.AppImage

  build-libretro-linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Patch version
      run: |
        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" core/Cargo.toml libretro/Cargo.toml
        sed -i "s/LIBRARY_VERSION: &\[u8\] = b\".*\\\\0\";/LIBRARY_VERSION: \&[u8] = b\"$VERSION\\\\0\";/" libretro/src/lib.rs
        sed -i "s/display_version = \".*\"/display_version = \"$VERSION\"/" libretro/krankulator_libretro.info
    - run: cargo build --release -p krankulator-libretro
    - run: mv target/release/libkrankulator_libretro.so krankulator_libretro-linux-x86_64.so
    - uses: actions/upload-artifact@v4
      with:
        name: libretro-linux
        path: krankulator_libretro-linux-x86_64.so

  build-libretro-linux-arm64:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-gnu
    - name: Install cross-compilation toolchain
      run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
    - name: Patch version
      run: |
        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" core/Cargo.toml libretro/Cargo.toml
        sed -i "s/LIBRARY_VERSION: &\[u8\] = b\".*\\\\0\";/LIBRARY_VERSION: \&[u8] = b\"$VERSION\\\\0\";/" libretro/src/lib.rs
        sed -i "s/display_version = \".*\"/display_version = \"$VERSION\"/" libretro/krankulator_libretro.info
    - name: Build
      run: cargo build --release -p krankulator-libretro --target aarch64-unknown-linux-gnu
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    - run: mv target/aarch64-unknown-linux-gnu/release/libkrankulator_libretro.so krankulator_libretro-linux-aarch64.so
    - uses: actions/upload-artifact@v4
      with:
        name: libretro-linux-arm64
        path: krankulator_libretro-linux-aarch64.so

  build-libretro-windows:
    needs: version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Patch version
      shell: pwsh
      run: |
        foreach ($f in @('core/Cargo.toml', 'libretro/Cargo.toml')) {
          (Get-Content $f) -replace '^version = ".*"', "version = `"$env:VERSION`"" | Set-Content $f
        }
        (Get-Content 'libretro/src/lib.rs') -replace 'LIBRARY_VERSION: &\[u8\] = b".*\\0";', "LIBRARY_VERSION: &[u8] = b`"$env:VERSION\0`";" | Set-Content 'libretro/src/lib.rs'
        (Get-Content 'libretro/krankulator_libretro.info') -replace 'display_version = ".*"', "display_version = `"$env:VERSION`"" | Set-Content 'libretro/krankulator_libretro.info'
    - run: cargo build --release -p krankulator-libretro
    - run: Move-Item target/release/krankulator_libretro.dll krankulator_libretro.dll
    - uses: actions/upload-artifact@v4
      with:
        name: libretro-windows
        path: krankulator_libretro.dll

  build-libretro-macos:
    needs: version
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Patch version
      run: |
        sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" core/Cargo.toml libretro/Cargo.toml
        sed -i '' "s/LIBRARY_VERSION: &\[u8\] = b\".*\\\\0\";/LIBRARY_VERSION: \&[u8] = b\"$VERSION\\\\0\";/" libretro/src/lib.rs
        sed -i '' "s/display_version = \".*\"/display_version = \"$VERSION\"/" libretro/krankulator_libretro.info
    - run: cargo build --release -p krankulator-libretro
    - run: mv target/release/libkrankulator_libretro.dylib krankulator_libretro.dylib
    - uses: actions/upload-artifact@v4
      with:
        name: libretro-macos
        path: krankulator_libretro.dylib

  release:
    needs: [version, build-macos, build-windows, build-linux, build-libretro-linux, build-libretro-linux-arm64, build-libretro-windows, build-libretro-macos]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        merge-multiple: true
    - name: Delete old release
      run: gh release delete latest --yes --cleanup-tag || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "v${{ needs.version.outputs.version }}"
        body: |
          **v${{ needs.version.outputs.version }}** — built from commit ${{ github.sha }}.

          **macOS** — .app bundle (arm64). After unzipping, run `xattr -cr Krankulator.app` in Terminal before opening (required for unsigned apps).
          **Windows** — Portable .exe (x86_64). No installer needed. SmartScreen may warn "unrecognised app" — click More info → Run anyway.
          **Linux** — AppImage (x86_64). `chmod +x` and run.

          **RetroArch / libretro cores** — load in RetroArch via Load Core → Load Core (select file). Available for Linux x86_64, Linux aarch64 (Raspberry Pi), Windows x86_64, and macOS arm64.
        fail_on_unmatched_files: false
        files: |
          Krankulator-*-macOS-arm64.zip
          Krankulator-*-Windows-x86_64.zip
          Krankulator-*-Linux-x86_64.AppImage
          krankulator_libretro-linux-x86_64.so
          krankulator_libretro-linux-aarch64.so
          krankulator_libretro.dll
          krankulator_libretro.dylib
